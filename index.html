<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>UPI Fake Screenshot Detector</title>

    <!-- TensorFlow.js -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f5f5f5;
            padding: 40px;
        }

        h1 {
            color: #333;
        }

        .upload-box {
            border: 2px dashed #aaa;
            padding: 30px;
            background: white;
            border-radius: 10px;
            display: inline-block;
        }

        img {
            margin-top: 20px;
            border-radius: 10px;
            max-width: 300px;
        }

        #result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
        }

        .loader {
            margin-top: 15px;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>

    <h1>🔍 UPI Fake Screenshot Detector</h1>

    <div class="upload-box">
        <input type="file" id="fileInput" accept="image/*">
        <br>

        <div class="loader" id="status">Load an image to analyze</div>

        <img id="preview" />
        <div id="result"></div>
    </div>

    <script src="script.js"></script>

</body>
</html>
