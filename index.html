<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPI Batch Detector PRO</title>
    <link rel="stylesheet" href="style.css">

    <!-- ✅ FIXED Tesseract CDN -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>UPI Batch Detector PRO</h1>
            <p>Upload Multiple Screenshots - Instant Analysis</p>
        </header>

        <!-- Upload -->
        <div class="upload-area">
            <input type="file" id="batchFileInput" multiple accept="image/*">
        </div>

        <!-- Progress -->
        <div id="progress"></div>

        <!-- Results -->
        <div id="results"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
