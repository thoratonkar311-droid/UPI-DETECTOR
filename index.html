<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPI Screenshot Detector - Real Time</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-camera"></i> UPI Screenshot Detector</h1>
            <p>Real-time detection of UPI payment screenshots</p>
        </header>

        <main>
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">
                    <i class="fas fa-cloud-upload-alt"></i>
                </div>
                <p>Drag & drop your screenshot here or click to browse</p>
                <input type="file" id="fileInput" accept="image/*" hidden>
                <button id="browseBtn" class="btn-primary">
                    <i class="fas fa-folder-open"></i> Browse Files
                </button>
            </div>

            <div class="camera-section" id="cameraSection" style="display: none;">
                <div class="camera-container">
                    <video id="video" autoplay playsinline></video>
                    <canvas id="canvas" style="display: none;"></canvas>
                    <button id="captureBtn" class="btn-primary">
                        <i class="fas fa-camera"></i> Capture Screenshot
                    </button>
                </div>
            </div>

            <div class="result-section" id="resultSection" style="display: none;">
                <div class="image-preview">
                    <img id="previewImg" alt="Detected Image">
                </div>
                <div class="detection-result" id="detectionResult">
                    <div class="spinner" id="spinner"></div>
                </div>
            </div>
        </main>

        <div class="features">
            <h3><i class="fas fa-star"></i> Features</h3>
            <ul>
                <li>✅ Real-time camera capture</li>
                <li>✅ Drag & drop support</li>
                <li>✅ Instant UPI detection</li>
                <li>✅ 95%+ accuracy</li>
                <li>✅ Mobile responsive</li>
            </ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
